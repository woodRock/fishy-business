name: Example Verification

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-examples:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Install the package in editable mode with all core dependencies
        pip install -e .

    - name: Download private dataset
      env:
        FISHY_DATA_TOKEN: ${{ secrets.FISHY_DATA_TOKEN }}
      run: |
        fishy download-data
      
    - name: Run example scripts
      run: |
        python tests/test_tutorials.py
