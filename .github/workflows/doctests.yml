name: Doctests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  run-doctests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.9
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
        
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y graphviz libgraphviz-dev

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install -e .

    - name: Download private dataset
      env:
        FISHY_DATA_TOKEN: ${{ secrets.FISHY_DATA_TOKEN }}
      run: |
        fishy download-data
        
    - name: Run documentation tests
      run: |
        # Run pytest on the fishy package with doctest module enabled
        # We set PYTHONPATH to current directory to ensure imports work correctly
        export PYTHONPATH=$PYTHONPATH:.
        pytest --doctest-modules fishy/
